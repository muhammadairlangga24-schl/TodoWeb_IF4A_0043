<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>TodoWeb</title>
  </head>
  <body>
    <div class="card">
      <h1>To-Do List</h1>

      <div class="form">
        <input type="text" id="inputTugas" placeholder="Enter a Task" />
        <input type="date" id="inputTanggal" />
        <button id="btnTambah">Tambah Data</button>
      </div>

      <h2>Daftar Tugas</h2>
      <p id="kosong">-Belum ada tugas-</p>
      <ul id="daftarTugas"></ul>
    </div>

    <div id="modalEdit" class="modal">
      <div class="modal-content">
        <h2>Edit Tugas</h2>

        <input type="text" id="editTugas" placeholder="Edit tugas" />
        <input type="date" id="editTanggal" />

        <div class="modal-button">
          <button id="simpanEdit">Simpan</button>
          <button id="batalEdit" class="hapus">Batal</button>
        </div>
      </div>
    </div>

    <div id="modal" class="modal">
      <div class="modal-content">
        <h2 id="modalTitle">Peringatan</h2>

        <p id="modalText"></p>

        <div class="modal-button">
          <button id="modalOk">OK</button>
          <button id="modalCancel" class="hapus">Batal</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
